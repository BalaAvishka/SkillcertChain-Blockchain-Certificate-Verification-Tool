name: SkincertChain CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Build & Test ─────────────────────────────────────────────────────────────
  build:
    name: Build & Test (Java 17)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build with Maven (skip Solidity generation in CI)
        run: mvn -B clean package -DskipTests=false
             -Dskip.web3j.generate=true
        env:
          ETH_NODE_URL:    ${{ secrets.ETH_NODE_URL    || 'http://localhost:8545' }}
          ETH_PRIVATE_KEY: ${{ secrets.ETH_PRIVATE_KEY || '' }}
          CONTRACT_ADDRESS: ${{ secrets.CONTRACT_ADDRESS || '0x0000000000000000000000000000000000000000' }}

      - name: Run unit tests
        run: mvn -B test -Dskip.web3j.generate=true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: skincertchain-jar
          path: target/skincertchain-*.jar

  # ── Docker Build ─────────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true   # Skips if secrets not configured

      - name: Build Docker image
        run: docker build -t skincertchain:${{ github.sha }} .

      - name: Push Docker image (if secrets configured)
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        run: |
          docker tag skincertchain:${{ github.sha }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/skincertchain:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/skincertchain:latest
